<div class="min-h-screen bg-background flex pt-16">
  <!-- Sidebar -->
  <app-sidebar
    [items]="sidebarItems"
    [collapsed]="sidebarCollapsed()"
    [isOpen]="sidebarOpen()"
    [windowWidth]="windowWidth()"
    [activeSection]="activeSection()"
    [sectionClasses]="getSectionClasses(activeSection())"
    [subSectionClasses]="getSubSectionClasses(activeSubSection())"
    (toggleCollapse)="toggleSidebarCollapse()"
    (closeSidebar)="closeSidebar()"
    (selectSection)="selectSection($event)"
    (selectSubSection)="selectSubSection($event)"
  />

  <!-- Overlay pour mobile -->
  @if (shouldShowMobileOverlay()) {
    <app-mobile-overlay (closeSidebar)="closeSidebar()" />
  }

  <!-- Main content -->
  <main class="flex-1 transition-all duration-300" [class]="mainContentClasses()">
    <!-- Header mobile -->
    <div class="lg:hidden fixed top-16 left-0 right-0 z-30 flex h-16 items-center justify-between px-4 bg-background border-b border-accent">
      <button
        (click)="toggleSidebar()"
        class="p-2 rounded-lg hover:bg-accent text-text"
      >
        <img
          [ngSrc]="'/icons/grid.svg'"
          alt="Ouvrir menu"
          class="w-6 h-6 icon-invert"
          width="24"
          height="24"
        />
      </button>
      <h1 class="text-lg font-semibold text-text">{{ currentSectionTitle() }}</h1>
      <div></div>
    </div>

    <!-- Page content -->
    <div class="p-6 lg:p-8 pt-20 lg:pt-6 min-h-screen">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
