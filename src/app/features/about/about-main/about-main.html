<div>
  <header class="mb-8 lg:mb-12">
    <h1
      id="about-heading"
      class="bg-background text-text decoration-accent mb-2 flex justify-center text-3xl font-bold underline lg:text-5xl"
    >
      {{ aboutMainData.title }}
    </h1>
    <p class="text-text/80 mx-auto mb-4 max-w-3xl text-center text-lg lg:mb-8">
      {{ aboutMainData.subTitle }}
    </p>
  </header>
  <div class="container mx-auto px-4">
    <section
      class="flex flex-col lg:flex-row lg:items-start lg:gap-12"
      aria-labelledby="profile-section"
    >
      <aside class="lg:w-1/3">
        <div class="flex flex-col lg:flex-row lg:items-start lg:gap-4">
          <figure
            class="relative flex h-64 w-64 justify-center py-2 lg:mb-0 lg:justify-start lg:pt-6 lg:mt-8"
          >
            <img
              [ngSrc]="aboutMainData.profileImage"
              alt="Photo de profil de développeur"
              fill
              class="rounded-lg object-cover shadow-lg"
            />
            <figcaption class="sr-only">Photo de profil</figcaption>
          </figure>

          <div class="w-full lg:w-auto lg:self-center">
            @defer (on viewport) {
              <app-about-badge-tech />
            } @placeholder {
              <div class="flex flex-wrap gap-2 justify-center lg:justify-start">
                <div class="bg-background-200 rounded-full px-3 py-1 text-sm w-20 h-8 animate-pulse"></div>
                <div class="bg-background-200 rounded-full px-3 py-1 text-sm w-24 h-8 animate-pulse"></div>
                <div class="bg-background-200 rounded-full px-3 py-1 text-sm w-16 h-8 animate-pulse"></div>
                <div class="bg-background-200 rounded-full px-3 py-1 text-sm w-28 h-8 animate-pulse"></div>
              </div>
            }
          </div>
        </div>
      </aside>

      <article class="mt-8 lg:mt-0 lg:w-2/3">
        <app-about-hero />
      </article>
    </section>

    <!-- Section pour Objectif professionnel et Mindset -->
    <section
      class="mt-4 flex flex-col lg:mt-8 lg:flex-row lg:gap-8"
      aria-label="Objectifs et mindset"
    >
      @defer (on viewport; prefetch on hover) {
        <article
          class="bg-background shadow-text border-accent rounded-lg border p-4 hover:scale-105 hover:shadow-md hover:transition-all hover:duration-300 hover:ease-in-out lg:w-1/3"
        >
          <app-about-objective-card />
        </article>
      } @placeholder {
        <article
          class="bg-background shadow-text border-accent rounded-lg border p-4 lg:w-1/3"
        >
          <div class="h-32 animate-pulse">
            <div class="bg-background-200 rounded h-6 w-3/4 mb-3"></div>
            <div class="bg-background-200 rounded h-4 w-full mb-2"></div>
            <div class="bg-background-200 rounded h-4 w-5/6"></div>
          </div>
        </article>
      }
      @defer (on viewport; prefetch on hover) {
        <article class="mt-6 lg:mt-0 lg:w-2/3">
          <app-about-card-mindset />
        </article>
      } @placeholder {
        <article class="mt-6 lg:mt-0 lg:w-2/3">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-background shadow-text border-accent rounded-lg border p-4">
              <div class="h-24 animate-pulse">
                <div class="bg-background-200 rounded h-5 w-2/3 mb-2"></div>
                <div class="bg-background-200 rounded h-4 w-full mb-2"></div>
                <div class="bg-background-200 rounded h-4 w-4/5"></div>
              </div>
            </div>
            <div class="bg-background shadow-text border-accent rounded-lg border p-4">
              <div class="h-24 animate-pulse">
                <div class="bg-background-200 rounded h-5 w-2/3 mb-2"></div>
                <div class="bg-background-200 rounded h-4 w-full mb-2"></div>
                <div class="bg-background-200 rounded h-4 w-4/5"></div>
              </div>
            </div>
          </div>
        </article>
      }
    </section>
  </div>
</div>
