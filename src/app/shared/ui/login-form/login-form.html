<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
  <div>
    <label for="email" class="block text-sm font-medium text-text">Email</label>
    <input id="email" type="email" formControlName="email" autocomplete="email" required class="block px-3 py-2 mt-1 w-full border rounded-md shadow-sm bg-background border-gray-600 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm">
  </div>
  <div>
    <label for="password" class="block text-sm font-medium text-text">Mot de passe</label>
    <input id="password" type="password" formControlName="password" autocomplete="current-password" required class="block px-3 py-2 mt-1 w-full border rounded-md shadow-sm bg-background border-gray-600 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm">
  </div>
  @if (errorMessage()) {
    <div class="text-sm text-red-500">{{ errorMessage() }}</div>
  }
  <app-button type="submit" color="primary" [disabled]="form.invalid || isLoading()" [isLoading]="isLoading()" [customClass]="'w-full py-3'">
    Se connecter
  </app-button>
</form>
