<div class="relative md:hidden">
  <button
    (click)="toggleMenu()"
    class="inline-flex justify-center items-center p-2 rounded-md transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-accent hover:text-accent hover:bg-background text-text"
    aria-expanded="false"
    [attr.aria-expanded]="isMenuOpen()"
    aria-label="Menu principal"
  >
    <span class="sr-only">Ouvrir le menu principal</span>
    <div class="relative w-6 h-6">
      @if (!isMenuOpen()) {
        <img
          ngSrc="/icons/open.svg"
          alt="Ouvrir le menu"
          class="absolute inset-0 w-6 h-6 opacity-100 transition-all duration-200 rotate-0 icon-invert"
          height="24" width="24"
        />
      }
      @if (isMenuOpen()) {
        <img
          ngSrc="/icons/close.svg"
          alt="Fermer le menu"
          class="absolute inset-0 w-6 h-6 opacity-100 transition-all duration-200 rotate-90 icon-invert"
          height="24" width="24"/>
      }
    </div>
  </button>

  @if (isMenuOpen()) {
    <div class="absolute right-0 z-50 mt-2 w-64 top-full">

      <div
        class="overflow-hidden relative z-50 border rounded-lg shadow-lg opacity-100 transition-all duration-200 ease-out transform scale-100 bg-background border-accent"
      >
        <div class="py-2">
          @for (item of navigationItems; track item.label) {
            <button
              (click)="onNavigationClick(item.route)"
              class="flex items-center px-4 py-3 space-x-3 w-full text-sm font-medium text-left transition-colors duration-200 group hover:text-accent hover:bg-accent/10 text-text"
            >
              <img
                [ngSrc]="item.icon"
                [alt]="item.altText"
                class="w-6 h-6 transition-transform duration-200 group-hover:scale-110 icon-invert"
                width="24"
                height="24"
              />
              <span class="flex-1">{{ item.label }}</span>
            </button>
          }
          <div class="my-2 border-t border-accent/20"></div>
          @if (!supabaseService.user()) {
            <button
              (click)="openLoginModal()"
              class="flex items-center px-4 py-3 space-x-3 w-full text-sm font-medium text-left transition-colors duration-200 group hover:text-accent hover:bg-accent/10 text-text"
            >
              <img
                ngSrc="/icons/login.svg"
                alt="Login"
                class="w-6 h-6 transition-transform duration-200 group-hover:scale-110 icon-invert"
                width="24"
                height="24"
              />
              <span class="flex-1">Connexion</span>
            </button>
          } @else {
            <button
              (click)="navigateToAdmin()"
              class="flex items-center px-4 py-3 space-x-3 w-full text-sm font-medium text-left transition-colors duration-200 group hover:text-accent hover:bg-accent/10 text-text"
            >
              <img
                ngSrc="/icons/admin.svg"
                alt="Admin"
                class="w-6 h-6 transition-transform duration-200 group-hover:scale-110 icon-invert"
                width="24"
                height="24"
              />
              <span class="flex-1">Admin</span>
            </button>
            <button
              (click)="logout()"
              class="flex items-center px-4 py-3 space-x-3 w-full text-sm font-medium text-left transition-colors duration-200 group hover:text-accent hover:bg-accent/10 text-text"
            >
              <img
                ngSrc="/icons/logout.svg"
                alt="Logout"
                class="w-6 h-6 transition-transform duration-200 group-hover:scale-110 icon-invert"
                width="24"
                height="24"
              />
              <span class="flex-1">Déconnexion</span>
            </button>

          }
        </div>
      </div>
    </div>
  }
</div>
