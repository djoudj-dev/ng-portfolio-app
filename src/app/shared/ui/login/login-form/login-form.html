<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="login-email" class="block text-sm font-medium text-text"
          >Email</label
        >
        <input
          id="login-email"
          type="email"
          formControlName="email"
          autocomplete="email"
          required
          class="block px-3 py-2 mt-1 w-full border rounded-md shadow-sm bg-background border-gray-600 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
        />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-text"
          >Mot de passe</label
        >
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          required
          class="block px-3 py-2 mt-1 w-full border rounded-md shadow-sm bg-background border-gray-600 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"
        />
      </div>
      @if (errorMessage()) {
        <div class="text-sm text-red-500">{{ errorMessage() }}</div>
      }
      
      @if (rateLimitInfo().isBlocked) {
        <div class="text-sm text-orange-500 bg-orange-50 border border-orange-200 rounded p-3">
          <p><strong>Trop de tentatives de connexion</strong></p>
          <p>Réessayez dans {{ rateLimitInfo().minutesRemaining }} minute(s)</p>
        </div>
      }
      
      <app-button
        type="submit"
        color="primary"
        [disabled]="form.invalid || isLoading() || rateLimitInfo().isBlocked"
        [isLoading]="isLoading()"
        [customClass]="'w-full py-3'"
      >
        @if (rateLimitInfo().isBlocked) {
          Bloqué ({{ rateLimitInfo().minutesRemaining }}min)
        } @else {
          Se connecter
        }
      </app-button>
    </form>
